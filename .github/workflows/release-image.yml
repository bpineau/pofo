name: release-image

# Build the container image and push it to GHCR.
#
# Tag-gated: a `v*` tag triggers a release, keeping GitHub free-tier usage under
# control (no build on every push to master). The prod server auto-deploys
# ghcr.io/bpineau/pofo:latest via Watchtower; server config lives in zouh-prod.
# workflow_dispatch allows a manual rebuild of latest from the default branch.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          image="ghcr.io/bpineau/pofo"
          tags="${image}:latest,${image}:${GITHUB_SHA::7}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tags="${tags},${image}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prune old container versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: pofo
          package-type: container
          min-versions-to-keep: 10
