<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pofo — FIRE decumulation</title>
<link rel="stylesheet" href="app.css"></head>
<body>
<h1>FIRE decumulation explorer</h1>
<p class="meta">All values in real euros (today's purchasing power), net of tax. Hypothesis-exploration tool, not investment advice.</p>
<div id="layout">
<form id="controls"></form>
<p id="modelhelp"></p>
<p id="note"></p>
<div id="solve">
<label>Target ruin <input type="number" id="targetRuin" min="0.5" max="20" step="0.5" value="5">%</label>
<button id="solveBtn" type="button">Solve</button>
<span id="solveOut"></span>
</div>
<div id="cards"></div>
<div id="charts">
<div id="arbitrageSvg"></div>
<div id="recoverySvg"></div>
</div></div>
<script src="app.js"></script>
</body></html>
